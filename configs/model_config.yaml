# OmniReview Model Configuration
# All hyperparameters and paths for the pipeline.

model:
  embedding_dim: 384
  latent_dim: 128
  num_categories: 5
  num_ratings: 5

training:
  batch_size: 64
  learning_rate: 0.001
  seed: 42
  epochs:
    cnn: 10
    rnn: 15
    vae: 15
    t5: 5
    flow: 20
    diffusion: 15
    gan: 5

paths:
  data_dir: "data"
  checkpoint_dir: "checkpoints"
  output_dir: "outputs"

flow:
  num_layers: 8
  hidden_features: 64
  context_features: 32

diffusion:
  num_steps: 100
  beta_start: 0.0001
  beta_end: 0.02

gan:
  learning_rate: 0.0002
  betas: [0.5, 0.999]

t5:
  model_name: "t5-small"
  lora_r: 8
  lora_alpha: 32
  lora_dropout: 0.1
  max_length: 128
